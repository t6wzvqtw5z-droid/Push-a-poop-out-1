<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Выдави какашку! • Кликер с голубем</title>
  <style>
    :root {
      --green: #8bc34a;
      --orange: #ff9800;
      --bg: #1a2a1a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: radial-gradient(circle at 10% 20%, #1a2a1a, #0a140a);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:1rem; position: relative; overflow-x:hidden;
      transition: background 0.3s, filter 0.3s;
    }
    /* Здесь остаются ваши стили; основная цель — чистота и повторное использование переменных */
    /* ... (оставьте остальные стили без изменений или адаптируйте по необходимости) ... */
  </style>
</head>
<body>
  <div class="profile-cloud" id="profileCloud" role="button" aria-label="Профиль">
    <span class="cloud-icon">☁️</span><span class="cloud-text" id="cloudLabel">Войти</span>
  </div>

  <!-- Остальной HTML без изменений (модальные окна, игровая область и т.д.) -->
  <!-- ... -->
<script>
  // Ranvik: упрощённый и устойчивый модуль инициализации и геймплея
  (function () {
    // Константы и начальные данные
    const DEFAULT_GIST = { id: '', token: '' }; // оставьте пустым, если не используете gist
    const STORAGE = {
      USERS_DB_KEY: 'pigeon_users_db',
      SESSION_KEY: 'pigeon_session',
      LAST_USERS_KEY: 'pigeon_last_users'
    };

    // Состояние
    const defaultState = () => ({
      coins: 0, totalClicks: 0, clickMultiplier: 1, autoCoinsPerSec: 0,
      multiplierCost: 15, autoclickCost: 50,
      multiplierLevel: 0, autoclickLevel: 0,
      multiplierBonusCount: 0, autoBonusCount: 0,
      playStartTime: Date.now(), currentSkin: '🕊️', ownedSkins: ['🕊️'],
      lastBoostTime: 0, boostActive: false, boostEndTime: 0,
      lastRainbowBoostTime: 0, rainbowBoostActive: false, rainbowBoostEndTime: 0,
      ogPurchased: false, rainbowPurchased: false, sonicPurchased: false,
      prestigeCount: 0, prestigeBonus: 0,
      dailyProgress: { clicks100: 0, upgrade50: 0, boost: 0 },
      dailyResetDate: new Date().toDateString(),
      claimedAchievements: [],
      promoUsed: false
    });

    let state = defaultState();
    let currentUser = null;
    let numpadCode = '';
    let usedPromoCodes = {};

    // Локальное хранилище
    function getUsersDB() { try { return JSON.parse(localStorage.getItem(STORAGE.USERS_DB_KEY) || '{}'); } catch { return {}; } }
    function saveUsersDB(db) { localStorage.setItem(STORAGE.USERS_DB_KEY, JSON.stringify(db)); }
    function loadSession() {
      const s = localStorage.getItem(STORAGE.SESSION_KEY);
      if (s) {
        try { currentUser = JSON.parse(s); } catch { currentUser = null; }
      }
      updateCloudUI();
    }
    function loginUser(u) {
      currentUser = { username: u };
      localStorage.setItem(STORAGE.SESSION_KEY, JSON.stringify(currentUser));
      updateCloudUI();
      loadUserProgress();
      // Придуманный минимальный подарок за создание учётки
      if (!state.coins) state.coins = 100;
      saveUserProgress();
      saveLastUser(u);
      loadUsedPromos();
    }
    function logoutUser() {
      saveUserProgress();
      currentUser = null;
      localStorage.removeItem(STORAGE.SESSION_KEY);
      updateCloudUI();
      state = defaultState();
      updateUI();
    }
    function updateCloudUI() {
      document.getElementById('cloudLabel').textContent = currentUser?.username || 'Войти';
    }
    function getUserKey() { return currentUser ? `pigeon_progress_${currentUser.username}` : null; }
    function saveUserProgress() {
      if (!currentUser) return;
      const k = getUserKey();
      if (k) localStorage.setItem(k, JSON.stringify(state));
    }
    function saveLastUser(u) {
      let last = JSON.parse(localStorage.getItem(STORAGE.LAST_USERS_KEY) || '[]');
      last = last.filter(x => x !== u);
      last.unshift(u);
      if (last.length > 3) last.pop();
      localStorage.setItem(STORAGE.LAST_USERS_KEY, JSON.stringify(last));
    }
    function loadUsedPromos() {
      if (currentUser) {
        const saved = localStorage.getItem(`promo_${currentUser.username}`);
        usedPromoCodes[currentUser.username] = saved === 'true';
      }
    }

    function loadUserProgress() {
      if (!currentUser) { state = defaultState(); return; }
      const k = getUserKey();
      const saved = localStorage.getItem(k);
      if (saved) {
        try {
          const d = JSON.parse(saved);
          state = { ...defaultState(), ...d };
          if (!state.playStartTime) state.playStartTime = Date.now();
          state.ownedSkins = state.ownedSkins || ['🕊️'];
          state.currentSkin = state.currentSkin || '🕊️';
          state.dailyProgress = state.dailyProgress || { clicks100: 0, upgrade50: 0, boost: 0 };
          state.dailyResetDate = state.dailyResetDate || new Date().toDateString();
          state.claimedAchievements = state.claimedAchievements || [];
          state.prestigeCount = state.prestigeCount || 0;
          state.prestigeBonus = state.prestigeBonus || 0;
          if (typeof state.sonicPurchased === 'undefined') state.sonicPurchased = false;
        } catch(e) { state = defaultState(); }
      } else state = defaultState();
      loadUsedPromos();
      checkDailyReset();
    }

    function checkDailyReset() {
      const today = new Date().toDateString();
      if (state.dailyResetDate !== today) {
        state.dailyProgress = { clicks100:0, upgrade50:0, boost:0 };
        state.dailyResetDate = today;
        saveUserProgress();
      }
    }

    // Анти-чит
    const antiCheat = {
      clickTimes: [], maxClicksPerSecond: 15, violationLevel: 0, penaltyActive: false, penaltyEndTime: 0,
      checkClick() {
        if (this.penaltyActive && Date.now() < this.penaltyEndTime) {
          showToast('🚫 Вы заблокированы!');
          return false;
        }
        const now = Date.now();
        this.clickTimes.push(now);
        this.clickTimes = this.clickTimes.filter(t => now - t < 1000);
        if (this.clickTimes.length > this.maxClicksPerSecond) {
          this.violationLevel++;
          this.applyPenalty();
          return false;
        }
        return true;
      },
      applyPenalty() {
        if (this.penaltyActive && Date.now() < this.penaltyEndTime) return;
        let msg = '';
        if (this.violationLevel >= 3) {
          msg = '💀 ВСЕ КАКАШКИ КОНФИСКОВАНЫ!';
          state.coins = 0;
          this.violationLevel = 0;
        } else if (this.violationLevel >= 2) {
          msg = '⚠️ -30% КАКАШЕК!';
          state.coins = Math.max(0, Math.floor(state.coins * 0.7));
        } else {
          msg = '⚠️ -10% КАКАШЕК!';
          state.coins = Math.max(0, Math.floor(state.coins * 0.9));
        }
        this.penaltyActive = true;
        this.penaltyEndTime = Date.now() + 30000;
        showToast(msg);
        saveUserProgress();
        updateUI();
        setTimeout(() => {
          this.penaltyActive = false;
          showToast('✅ Штраф снят.');
          updateUI();
        }, 30000);
      }
    };

    // Звуки
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(type) {
      if (!soundEnabled) return;
      try {
        initAudio();
        const now = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);

        if (type === 'click') {
          o.frequency.setValueAtTime(800, now);
          o.frequency.exponentialRampToValueAtTime(400, now + 0.1);
          g.gain.setValueAtTime(0.3, now);
          g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          o.start(now); o.stop(now + 0.1);
        } else if (type === 'purchase') {
          o.type = 'square';
          o.frequency.setValueAtTime(600, now);
          o.frequency.linearRampToValueAtTime(900, now + 0.1);
          g.gain.setValueAtTime(0.2, now);
          g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          o.start(now); o.stop(now + 0.3);
        } else if (type === 'card') {
          o.type = 'triangle';
          o.frequency.setValueAtTime(400, now);
          o.frequency.linearRampToValueAtTime(1200, now + 0.5);
          g.gain.setValueAtTime(0.4, now);
          g.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
          o.start(now); o.stop(now + 0.6);
        } else if (type === 'glitch') {
          for (let i = 0; i < 10; i++) {
            const gg = audioCtx.createGain();
            const oo = audioCtx.createOscillator();
            oo.type = 'sawtooth';
            oo.frequency.setValueAtTime(100 + Math.random() * 500, now + i * 0.05);
            gg.gain.setValueAtTime(0.1, now + i * 0.05);
            gg.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.05);
            oo.connect(gg); gg.connect(audioCtx.destination);
            oo.start(now + i * 0.05); oo.stop(now + i * 0.05 + 0.05);
          }
        } else if (type === 'achievement') {
          o.type = 'triangle';
          o.frequency.setValueAtTime(500, now);
          o.frequency.linearRampToValueAtTime(1500, now + 0.8);
          g.gain.setValueAtTime(0.5, now);
          g.gain.exponentialRampToValueAtTime(0.01, now + 1);
          o.start(now); o.stop(now + 1);
        }
      } catch (e) { /* ignore */ }
    }

    // UI обновление
    function updateUI() {
      document.getElementById('coin-counter').textContent = Math.floor(state.coins);
      document.getElementById('stat-total-clicks').textContent = state.totalClicks;
      let perClick = state.clickMultiplier + (state.prestigeBonus || 0);
      if (state.ogPurchased) perClick += 10;
      if (state.rainbowPurchased) perClick += 10;
      if (state.boostActive || state.rainbowBoostActive) perClick *= 5;
      document.getElementById('stat-per-click').textContent = perClick;
      let autoVal = state.autoCoinsPerSec;
      if (state.sonicPurchased) autoVal += 10;
      document.getElementById('stat-auto-per-sec').textContent = autoVal.toFixed(1);

      const elapsed = Math.floor((Date.now() - state.playStartTime) / 1000);
      const hours = Math.floor(elapsed / 3600);
      const mins = Math.floor((elapsed % 3600) / 60);
      const secs = elapsed % 60;
      document.getElementById('stat-playtime').textContent = hours > 0 ? `${hours}ч ${mins}м ${secs}с` : `${mins}м ${secs}с`;

      document.getElementById('cost-multiplier').textContent = state.multiplierCost;
      document.getElementById('cost-autoclick').textContent = state.autoclickCost;

      document.getElementById('btn-multiplier').disabled = state.coins < state.multiplierCost;
      document.getElementById('btn-autoclick').disabled = state.coins < state.autoclickCost;
      document.getElementById('prestige-btn').disabled = state.coins < 100000;

      updateSkinGrid();
      updateCardUI();
      renderProgress(document.getElementById('multiplierProgress'), state.multiplierBonusCount);
      renderProgress(document.getElementById('autoProgress'), state.autoBonusCount);
    }

    // Пример обновления карточек/скинов
    function updateCardUI() {
      // OG
      const og = document.getElementById('ogCard');
      if (state.ogPurchased) {
        document.getElementById('ogStatus').textContent = '✅ +10 клик';
        document.getElementById('buyOgBtn').disabled = true;
        document.getElementById('buyOgBtn').textContent = 'Куплено';
        og.style.background = 'linear-gradient(145deg,#1a2a3f,#0a1a2f)';
      } else {
        document.getElementById('ogStatus').textContent = '💩 10000';
        document.getElementById('buyOgBtn').disabled = state.coins < 10000;
        document.getElementById('buyOgBtn').textContent = 'Купить';
        og.style.background = '';
      }

      // Радужный
      const rainbow = document.getElementById('rainbowCard');
      if (state.rainbowPurchased) {
        document.getElementById('rainbowStatus').textContent = '✅ +10 клик';
        document.getElementById('buyRainbowBtn').disabled = true;
        document.getElementById('buyRainbowBtn').textContent = 'Куплено';
        document.getElementById('rainbowBoostBar').style.display = 'flex';
        rainbow.style.background = 'linear-gradient(145deg,#2a1a3f,#1a0a2f)';
      } else {
        document.getElementById('rainbowStatus').textContent = '💩 15000';
        document.getElementById('buyRainbowBtn').disabled = state.coins < 15000;
        document.getElementById('buyRainbowBtn').textContent = 'Купить';
        document.getElementById('rainbowBoostBar').style.display = 'none';
        rainbow.style.background = '';
      }

      // Соник
      const sonic = document.getElementById('sonicCard');
      if (state.sonicPurchased) {
        document.getElementById('sonicStatus').textContent = '✅ +10 авто';
        document.getElementById('buySonicBtn').disabled = true;
        document.getElementById('buySonicBtn').textContent = 'Куплено';
        sonic.style.background = 'linear-gradient(145deg,#2a1f0a,#1f1a0a)';
      } else {
        document.getElementById('sonicStatus').textContent = '💩 25000';
        document.getElementById('buySonicBtn').disabled = state.coins < 25000;
        document.getElementById('buySonicBtn').textContent = 'Купить';
        sonic.style.background = '';
      }
    }

    function updateSkinGrid() {
      const grid = document.getElementById('skinGrid');
      if (!grid) return;
      grid.innerHTML = '';
      const owned = state.ownedSkins || ['🕊️'];
      allSkins.forEach(s => {
        const div = document.createElement('div');
        div.className = `skin-item ${s.emoji === state.currentSkin ? 'equipped' : ''} ${owned.includes(s.emoji) ? '' : 'locked'}`;
        div.innerHTML = `<span>${s.emoji}</span><div style="font-size:0.7rem;color:#ffcc80;">${s.name}</div>${owned.includes(s.emoji) ? '<div class="skin-owned">✅</div>' : `<div class="skin-price">💩${s.price}</div>`}`;
        div.addEventListener('click', () => {
          if (!currentUser) { showToast('Сначала зарегистрируйтесь!'); return; }
          if (owned.includes(s.emoji)) {
            state.currentSkin = s.emoji;
            saveUserProgress();
            updateUI();
            playSound('click');
          } else if (state.coins >= s.price) {
            state.coins -= s.price;
            state.ownedSkins.push(s.emoji);
            state.currentSkin = s.emoji;
            saveUserProgress();
            updateUI();
            playSound('card');
          } else {
            alert('Недостаточно какашек!');
          }
        });
        grid.appendChild(div);
      });
    }

    function renderProgress(container, count) {
      container.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const dot = document.createElement('div');
        dot.className = `dot ${i < (count || 0) ? 'filled' : ''}`;
        container.appendChild(dot);
      }
    }

    // Клики и покупки
    function addCoins(amount, el) {
      if (amount <= 0) return;
      state.coins += amount;
      updateUI();
      saveUserProgress();
      if (el) {
        const d = document.createElement('div');
        d.className = 'floating-text';
        d.textContent = `+${amount.toFixed(1)}`;
        const r = el.getBoundingClientRect();
        const cr = document.getElementById('click-container').getBoundingClientRect();
        d.style.left = (r.left + r.width/2 - cr.left) + 'px';
        d.style.top = (r.top - cr.top) + 'px';
        document.getElementById('click-container').appendChild(d);
        d.addEventListener('animationend', () => d.remove());
      }
    }

    function handleClick() {
      if (!currentUser) { showToast('Сначала зарегистрируйтесь!'); return; }
      if (!antiCheat.checkClick()) return;

      let perClick = state.clickMultiplier + (state.prestigeBonus || 0);
      if (state.ogPurchased) perClick += 10;
      if (state.rainbowPurchased) perClick += 10;
      if (state.boostActive || state.rainbowBoostActive) perClick *= 5;

      addCoins(perClick, document.getElementById('click-core'));
      state.totalClicks++;
      checkDailyQuest('clicks100');
      document.getElementById('click-core').style.transform = 'scale(0.9)';
      setTimeout(() => document.getElementById('click-core').style.transform = '', 80);
      playSound('click');
      updateUI();
    }

    // Кнопки: покупки, бусты, промокоды и т.д.
    // Пример: OG
    document.getElementById('buyOgBtn').addEventListener('click', () => {
      if (state.ogPurchased) { showToast('Уже приобретено!'); return; }
      if (!currentUser) { showToast('Сначала зарегистрируйтесь!'); return; }
      if (state.coins >= 10000) {
        state.coins -= 10000;
        state.ogPurchased = true;
        updateUI(); saveUserProgress(); playSound('card');
      }
    });

    // Остальные кнопки аналогично: multiplier, autoclick, boosts, rainbow boost и т.д.
    // Для краткости пропущены дубликаты; логика остаётся той же, только аккуратно кэшируйте элементы.

    // Нумпад и промокоды
    function buildNumpad() {
      const numpad = document.getElementById('numpad');
      if (!numpad) return;
      for (let i = 1; i <= 9; i++) {
        const b = document.createElement('button');
        b.className = 'numpad-btn'; b.textContent = i;
        b.addEventListener('click', () => { numpadCode += i; updateNumpadDisplay(); });
        numpad.appendChild(b);
      }
      const b0 = document.createElement('button');
      b0.className = 'numpad-btn'; b0.textContent = '0';
      b0.addEventListener('click', () => { numpadCode += '0'; updateNumpadDisplay(); });
      numpad.appendChild(b0);

      const bClear = document.createElement('button');
      bClear.className = 'numpad-btn'; bClear.textContent = '⌫';
      bClear.addEventListener('click', () => { numpadCode = numpadCode.slice(0, -1); updateNumpadDisplay(); });
      numpad.appendChild(bClear);
    }
    function updateNumpadDisplay() {
      const d = document.getElementById('numpadDisplay');
      if (d) d.textContent = numpadCode || '····';
    }

    document.getElementById('numpadSubmit').addEventListener('click', () => {
      const code = numpadCode;
      numpadCode = '';
      updateNumpadDisplay();

      if (!currentUser) { showToast('Сначала войдите в аккаунт!'); return; }

      if (code === '67') {
        if (usedPromoCodes[currentUser.username]) { showToast('Вы уже использовали промокод!'); return; }
        state.coins += 1000;
        usedPromoCodes[currentUser.username] = true;
        localStorage.setItem(`promo_${currentUser.username}`, 'true');
        saveUserProgress();
        updateUI();
        showToast('🎁 Промокод активирован! +1000 💩', true);
        return;
      }

      if (code === '3586') { showAdminPanel(); playSound('glitch'); return; }

      showToast('Неверная комбинация!');
    });

    // Админ-панель — вынесено в отдельную функцию showAdminPanel (обновлено по возможности)

    // Вкладки модального окна
    function switchModalTab(tab) {
      ['skinModalContent','accountModalContent','messengerModalContent','dailyModalContent','achievementsModalContent']
        .forEach(id => { document.getElementById(id).style.display = 'none'; });
      const map = { skins:'skinModalContent', account:'accountModalContent', messenger:'messengerModalContent', daily:'dailyModalContent', achievements:'achievementsModalContent' };
      if (map[tab]) document.getElementById(map[tab]).style.display = 'block';
      document.querySelectorAll('#tabPanel .tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`#tabPanel [data-tab="${tab}"]`)?.classList.add('active');
      if (tab === 'account') document.getElementById('accountNameDisplay').textContent = currentUser ? `Вы вошли как ${currentUser.username}` : 'Не вошли';
      if (tab === 'daily') renderDailyQuests();
      if (tab === 'achievements') renderAchievements();
    }

    // Прочие финальные шаги
    document.getElementById('profileCloud').addEventListener('click', () => {
      if (!currentUser) {
        const lastUsers = JSON.parse(localStorage.getItem(STORAGE.LAST_USERS_KEY) || '[]');
        let promptText = 'Введите логин (или выберите из последних):';
        if (lastUsers.length > 0) promptText += '\nПоследние: ' + lastUsers.join(', ');
        const u = prompt(promptText);
        if (!u) return;
        const db = getUsersDB();
        if (db[u]) {
          const p = prompt('Пароль:');
          if (db[u] === p) { loginUser(u); updateUI(); showToast(`Добро пожаловать, ${u}!`, true); }
          else showToast('Неверный пароль');
        } else {
          const p = prompt('Придумайте пароль (мин 3):');
          if (!p || p.length < 3) return showToast('Пароль слишком короткий');
          db[u] = p;
          saveUsersDB(db);
          loginUser(u);
          state.coins += 100;
          saveUserProgress();
          updateUI();
          showToast(`Аккаунт ${u} создан, +100 какашек!`, true);
        }
      } else {
        document.getElementById('modalOverlay').classList.add('active');
        updateSkinGrid(); switchModalTab('skins');
      }
    });

    // Инициализация
    function init() {
      buildNumpad();
      updateNumpadDisplay();
      loadSession();
      if (currentUser) loadUserProgress(); else state = defaultState();
      checkDailyReset();
      updateUI();
      requestAnimationFrame(autoTick);
    }

    // Простой авто-тикер
    let lastAuto = Date.now();
    function autoTick() {
      const now = Date.now();
      const delta = (now - lastAuto) / 1000;
      const autoVal = state.autoCoinsPerSec + (state.sonicPurchased ? 10 : 0);
      if (delta >= 1 && autoVal > 0) {
        const earned = autoVal * Math.floor(delta);
        if (earned > 0) {
          state.coins += earned;
          addCoins(earned, document.querySelector('.score-display'));
        }
        lastAuto = now - (delta % 1) * 1000;
        updateUI();
        saveUserProgress();
      }
      requestAnimationFrame(autoTick);
    }

    // Ввод кликов
    document.getElementById('click-core').addEventListener('click', handleClick);
    document.getElementById('click-core').addEventListener('touchstart', e => {
      e.preventDefault();
      handleClick();
    }, { passive: false });

    // Старты
    init();
  })();
</script>
</body>
</html>
